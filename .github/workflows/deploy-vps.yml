name: Deploy to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: maternalink-vps-deploy
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_TAG: ${{ github.sha }}
  API_IMAGE_REPO: ghcr.io/ravenhouver/maternalink-api
  WEB_IMAGE_REPO: ghcr.io/ravenhouver/maternalink-web
  SPEECH_STT_IMAGE_REPO: ghcr.io/ravenhouver/maternalink-speech-stt

jobs:
  deploy:
    name: Build images and deploy with Podman
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          target: runner
          push: true
          tags: |
            ${{ env.API_IMAGE_REPO }}:${{ env.IMAGE_TAG }}
            ${{ env.API_IMAGE_REPO }}:latest

      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          target: runner
          push: true
          build-args: |
            NEXT_PUBLIC_API_BASE_URL=/api
          tags: |
            ${{ env.WEB_IMAGE_REPO }}:${{ env.IMAGE_TAG }}
            ${{ env.WEB_IMAGE_REPO }}:latest

      - name: Build and push speech STT image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: services/speech-stt/Dockerfile
          push: true
          tags: |
            ${{ env.SPEECH_STT_IMAGE_REPO }}:${{ env.IMAGE_TAG }}
            ${{ env.SPEECH_STT_IMAGE_REPO }}:latest

      - name: Deploy over SSH
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PASSWORD: ${{ secrets.VPS_PASSWORD }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_DEPLOY_PATH: ${{ secrets.VPS_DEPLOY_PATH }}
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_TOKEN: ${{ github.token }}
          IMAGE_TAG: ${{ env.IMAGE_TAG }}
          API_IMAGE_REPO: ${{ env.API_IMAGE_REPO }}
          WEB_IMAGE_REPO: ${{ env.WEB_IMAGE_REPO }}
          SPEECH_STT_IMAGE_REPO: ${{ env.SPEECH_STT_IMAGE_REPO }}
          REPO_URL: https://github.com/${{ github.repository }}.git
        run: |
          set -euo pipefail

          if [ -z "${VPS_HOST}" ] || [ -z "${VPS_USER}" ] || [ -z "${VPS_DEPLOY_PATH}" ]; then
            echo "Missing one or more required secrets: VPS_HOST, VPS_USER, VPS_DEPLOY_PATH" >&2
            exit 1
          fi

          if [ -z "${VPS_PASSWORD}" ] && [ -z "${VPS_SSH_KEY}" ]; then
            echo "Set VPS_SSH_KEY for key auth or VPS_PASSWORD for password auth" >&2
            exit 1
          fi

          sudo apt-get update
          sudo apt-get install -y sshpass

          SSH_OPTS="-o StrictHostKeyChecking=accept-new"

          if [ -n "${VPS_SSH_KEY}" ]; then
            SSH_KEY_FILE="${RUNNER_TEMP}/maternalink_vps_key"
            printf '%s\n' "${VPS_SSH_KEY}" > "${SSH_KEY_FILE}"
            chmod 600 "${SSH_KEY_FILE}"
            SSH_COMMAND=(ssh ${SSH_OPTS} -i "${SSH_KEY_FILE}")
          else
            SSH_COMMAND=(sshpass -p "${VPS_PASSWORD}" ssh ${SSH_OPTS} -o PreferredAuthentications=password -o PubkeyAuthentication=no -o KbdInteractiveAuthentication=no)
          fi

          "${SSH_COMMAND[@]}" "${VPS_USER}@${VPS_HOST}" \
            "VPS_DEPLOY_PATH='${VPS_DEPLOY_PATH}' IMAGE_TAG='${IMAGE_TAG}' API_IMAGE_REPO='${API_IMAGE_REPO}' WEB_IMAGE_REPO='${WEB_IMAGE_REPO}' SPEECH_STT_IMAGE_REPO='${SPEECH_STT_IMAGE_REPO}' REPO_URL='${REPO_URL}' GHCR_USERNAME='${GHCR_USERNAME}' GHCR_TOKEN='${GHCR_TOKEN}' bash -s" <<'REMOTE'
          set -euo pipefail

          BRANCH="main"
          DEPLOY_PATH="${VPS_DEPLOY_PATH}"
          APP_DOMAIN="hisyamardiansyah.me"
          WEB_ORIGIN="https://${APP_DOMAIN}"
          PUBLIC_API_BASE_URL="/api"

          if ! command -v git >/dev/null 2>&1; then
            echo "git is required on the VPS" >&2
            exit 1
          fi

          if ! command -v podman >/dev/null 2>&1; then
            echo "podman is required on the VPS" >&2
            exit 1
          fi

          if podman compose version >/dev/null 2>&1; then
            COMPOSE="podman compose"
          elif command -v podman-compose >/dev/null 2>&1; then
            COMPOSE="podman-compose"
          else
            echo "podman compose or podman-compose is required on the VPS" >&2
            exit 1
          fi

          mkdir -p "$(dirname "${DEPLOY_PATH}")"

          AUTH_REPO_URL="https://x-access-token:${GHCR_TOKEN}@${REPO_URL#https://}"

          if [ ! -d "${DEPLOY_PATH}/.git" ]; then
            rm -rf "${DEPLOY_PATH}"
            git clone --branch "${BRANCH}" "${AUTH_REPO_URL}" "${DEPLOY_PATH}"
            git -C "${DEPLOY_PATH}" remote set-url origin "${REPO_URL}"
          fi

          cd "${DEPLOY_PATH}"
          git checkout "${BRANCH}"
          git pull --ff-only "${AUTH_REPO_URL}" "${BRANCH}"

          if [ ! -f .env.production ]; then
            POSTGRES_PASSWORD="$(openssl rand -hex 24)"
            JWT_SECRET="$(openssl rand -hex 32)"
            cat > .env.production <<ENV
          POSTGRES_DB=maternalink
          POSTGRES_USER=maternalink
          POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
          DATABASE_URL=postgresql://maternalink:${POSTGRES_PASSWORD}@postgres:5432/maternalink?schema=public
          JWT_SECRET=${JWT_SECRET}
          WEB_ORIGIN=${WEB_ORIGIN}
          NEXT_PUBLIC_API_BASE_URL=${PUBLIC_API_BASE_URL}
          API_INTERNAL_BASE_URL=http://api:3001/api
          AI_MODE=fallback
          AI_SERVICE_TIMEOUT_MS=30000
          RUN_SEED=true
          SESSION_COOKIE_SECURE=true
          ENV
            chmod 600 .env.production
          fi

          update_env() {
            KEY="$1"
            VALUE="$2"
            if grep -q "^${KEY}=" .env.production; then
              sed -i "s|^${KEY}=.*|${KEY}=${VALUE}|" .env.production
            else
              printf '%s=%s\n' "${KEY}" "${VALUE}" >> .env.production
            fi
          }

          update_env WEB_ORIGIN "${WEB_ORIGIN}"
          update_env NEXT_PUBLIC_API_BASE_URL "${PUBLIC_API_BASE_URL}"
          update_env API_INTERNAL_BASE_URL "http://api:3001/api"
          update_env SESSION_COOKIE_SECURE "true"
          update_env SPEECH_STT_SERVICE_URL "http://speech-stt:8002"
          update_env SPEECH_STT_TIMEOUT_MS "600000"
          update_env STT_MODEL_SIZE "small"
          update_env STT_DEVICE "cpu"
          update_env STT_COMPUTE_TYPE "int8"

          set -a
          . ./.env.production
          set +a

          export API_IMAGE="${API_IMAGE_REPO}:${IMAGE_TAG}"
          export WEB_IMAGE="${WEB_IMAGE_REPO}:${IMAGE_TAG}"
          export SPEECH_STT_IMAGE="${SPEECH_STT_IMAGE_REPO}:${IMAGE_TAG}"

          printf '%s' "${GHCR_TOKEN}" | podman login ghcr.io -u "${GHCR_USERNAME}" --password-stdin

          ${COMPOSE} -f podman-compose.prod.yml down --remove-orphans || true
          for port in 41873 41874 41875; do
            CONTAINERS="$(podman ps -a --format '{{.ID}} {{.Ports}}' | awk -v pattern=":${port}->" '$0 ~ pattern { print $1 }')"
            if [ -n "${CONTAINERS}" ]; then
              podman rm -f ${CONTAINERS}
            fi
          done

          APP_IMAGES="$(podman images --format '{{.Repository}}:{{.Tag}} {{.ID}}' | awk '$1 ~ /ghcr.io\/ravenhouver\/(maternalink|furap-jogja)-/ { print $2 }' | sort -u)"
          if [ -n "${APP_IMAGES}" ]; then
            podman rmi -f ${APP_IMAGES} || true
          fi

          podman container prune -f || true
          podman image prune -af || true
          podman system prune -af || true

          podman pull "${API_IMAGE}"
          podman pull "${WEB_IMAGE}"
          podman pull "${SPEECH_STT_IMAGE}"

          ${COMPOSE} -f podman-compose.prod.yml down --remove-orphans || true
          for port in 41873 41874 41875; do
            CONTAINERS="$(podman ps -a --format '{{.ID}} {{.Ports}}' | awk -v pattern=":${port}->" '$0 ~ pattern { print $1 }')"
            if [ -n "${CONTAINERS}" ]; then
              podman rm -f ${CONTAINERS}
            fi
          done

          ${COMPOSE} -f podman-compose.prod.yml up -d
          ${COMPOSE} -f podman-compose.prod.yml ps

          CADDYFILE="/home/afif/caddy/Caddyfile"
          if [ -f "${CADDYFILE}" ] && [ -w "${CADDYFILE}" ]; then
            awk '
              /^hisyamardiansyah\.me/ { skip=1; depth=gsub(/{/, "{") - gsub(/}/, "}"); next }
              skip { depth += gsub(/{/, "{") - gsub(/}/, "}"); if (depth <= 0) skip=0; next }
              { print }
            ' "${CADDYFILE}" > /tmp/Caddyfile.clean
            cat >> /tmp/Caddyfile.clean <<CADDY

          ${APP_DOMAIN}, www.${APP_DOMAIN} {
                  handle /api/* {
                          reverse_proxy 127.0.0.1:41874
                  }

                  handle {
                          reverse_proxy 127.0.0.1:41873
                  }
          }
          CADDY
            cp /tmp/Caddyfile.clean "${CADDYFILE}"
            XDG_RUNTIME_DIR="${XDG_RUNTIME_DIR:-/run/user/$(id -u)}" podman exec caddy caddy reload --config /etc/caddy/Caddyfile --adapter caddyfile
          else
            echo "Existing rootless Caddy config not found or not writable at ${CADDYFILE}; HTTPS proxy must be configured manually" >&2
          fi
          REMOTE
