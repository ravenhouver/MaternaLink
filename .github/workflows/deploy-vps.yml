name: Deploy to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: maternalink-vps-deploy
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_TAG: ${{ github.sha }}
  API_IMAGE_REPO: ghcr.io/ravenhouver/furap-jogja-api
  WEB_IMAGE_REPO: ghcr.io/ravenhouver/furap-jogja-web
  SPEECH_STT_IMAGE_REPO: ghcr.io/ravenhouver/furap-jogja-speech-stt

jobs:
  deploy:
    name: Build images and deploy with Podman
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          target: runner
          push: true
          tags: |
            ${{ env.API_IMAGE_REPO }}:${{ env.IMAGE_TAG }}
            ${{ env.API_IMAGE_REPO }}:latest

      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          target: runner
          push: true
          build-args: |
            NEXT_PUBLIC_API_BASE_URL=http://172.93.186.62:41874/api
          tags: |
            ${{ env.WEB_IMAGE_REPO }}:${{ env.IMAGE_TAG }}
            ${{ env.WEB_IMAGE_REPO }}:latest

      - name: Build and push speech STT image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: services/speech-stt/Dockerfile
          push: true
          tags: |
            ${{ env.SPEECH_STT_IMAGE_REPO }}:${{ env.IMAGE_TAG }}
            ${{ env.SPEECH_STT_IMAGE_REPO }}:latest

      - name: Deploy over SSH
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PASSWORD: ${{ secrets.VPS_PASSWORD }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_DEPLOY_PATH: ${{ secrets.VPS_DEPLOY_PATH }}
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_TOKEN: ${{ github.token }}
          IMAGE_TAG: ${{ env.IMAGE_TAG }}
          API_IMAGE_REPO: ${{ env.API_IMAGE_REPO }}
          WEB_IMAGE_REPO: ${{ env.WEB_IMAGE_REPO }}
          SPEECH_STT_IMAGE_REPO: ${{ env.SPEECH_STT_IMAGE_REPO }}
          REPO_URL: https://github.com/${{ github.repository }}.git
        run: |
          set -euo pipefail

          if [ -z "${VPS_HOST}" ] || [ -z "${VPS_USER}" ] || [ -z "${VPS_DEPLOY_PATH}" ]; then
            echo "Missing one or more required secrets: VPS_HOST, VPS_USER, VPS_DEPLOY_PATH" >&2
            exit 1
          fi

          if [ -z "${VPS_PASSWORD}" ] && [ -z "${VPS_SSH_KEY}" ]; then
            echo "Set VPS_SSH_KEY for key auth or VPS_PASSWORD for password auth" >&2
            exit 1
          fi

          sudo apt-get update
          sudo apt-get install -y sshpass

          SSH_OPTS="-o StrictHostKeyChecking=accept-new"

          if [ -n "${VPS_SSH_KEY}" ]; then
            SSH_KEY_FILE="${RUNNER_TEMP}/maternalink_vps_key"
            printf '%s\n' "${VPS_SSH_KEY}" > "${SSH_KEY_FILE}"
            chmod 600 "${SSH_KEY_FILE}"
            SSH_COMMAND=(ssh ${SSH_OPTS} -i "${SSH_KEY_FILE}")
          else
            SSH_COMMAND=(sshpass -p "${VPS_PASSWORD}" ssh ${SSH_OPTS} -o PreferredAuthentications=password -o PubkeyAuthentication=no -o KbdInteractiveAuthentication=no)
          fi

          "${SSH_COMMAND[@]}" "${VPS_USER}@${VPS_HOST}" \
            "VPS_DEPLOY_PATH='${VPS_DEPLOY_PATH}' IMAGE_TAG='${IMAGE_TAG}' API_IMAGE_REPO='${API_IMAGE_REPO}' WEB_IMAGE_REPO='${WEB_IMAGE_REPO}' SPEECH_STT_IMAGE_REPO='${SPEECH_STT_IMAGE_REPO}' REPO_URL='${REPO_URL}' GHCR_USERNAME='${GHCR_USERNAME}' GHCR_TOKEN='${GHCR_TOKEN}' bash -s" <<'REMOTE'
          set -euo pipefail

          BRANCH="main"
          DEPLOY_PATH="${VPS_DEPLOY_PATH}"

          if ! command -v git >/dev/null 2>&1; then
            echo "git is required on the VPS" >&2
            exit 1
          fi

          if ! command -v podman >/dev/null 2>&1; then
            echo "podman is required on the VPS" >&2
            exit 1
          fi

          if podman compose version >/dev/null 2>&1; then
            COMPOSE="podman compose"
          elif command -v podman-compose >/dev/null 2>&1; then
            COMPOSE="podman-compose"
          else
            echo "podman compose or podman-compose is required on the VPS" >&2
            exit 1
          fi

          mkdir -p "$(dirname "${DEPLOY_PATH}")"

          AUTH_REPO_URL="https://x-access-token:${GHCR_TOKEN}@${REPO_URL#https://}"

          if [ ! -d "${DEPLOY_PATH}/.git" ]; then
            rm -rf "${DEPLOY_PATH}"
            git clone --branch "${BRANCH}" "${AUTH_REPO_URL}" "${DEPLOY_PATH}"
            git -C "${DEPLOY_PATH}" remote set-url origin "${REPO_URL}"
          fi

          cd "${DEPLOY_PATH}"
          git checkout "${BRANCH}"
          git pull --ff-only "${AUTH_REPO_URL}" "${BRANCH}"

          if [ ! -f .env.production ]; then
            POSTGRES_PASSWORD="$(openssl rand -hex 24)"
            JWT_SECRET="$(openssl rand -hex 32)"
            cat > .env.production <<ENV
          POSTGRES_DB=maternalink
          POSTGRES_USER=maternalink
          POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
          DATABASE_URL=postgresql://maternalink:${POSTGRES_PASSWORD}@postgres:5432/maternalink?schema=public
          JWT_SECRET=${JWT_SECRET}
          WEB_ORIGIN=http://172.93.186.62:41873
          NEXT_PUBLIC_API_BASE_URL=http://172.93.186.62:41874/api
          AI_MODE=fallback
          AI_SERVICE_TIMEOUT_MS=30000
          RUN_SEED=true
          SESSION_COOKIE_SECURE=false
          ENV
            chmod 600 .env.production
          fi

          set -a
          . ./.env.production
          set +a

          export API_IMAGE="${API_IMAGE_REPO}:${IMAGE_TAG}"
          export WEB_IMAGE="${WEB_IMAGE_REPO}:${IMAGE_TAG}"
          export SPEECH_STT_IMAGE="${SPEECH_STT_IMAGE_REPO}:${IMAGE_TAG}"

          printf '%s' "${GHCR_TOKEN}" | podman login ghcr.io -u "${GHCR_USERNAME}" --password-stdin
          podman pull "${API_IMAGE}"
          podman pull "${WEB_IMAGE}"
          podman pull "${SPEECH_STT_IMAGE}"

          ${COMPOSE} -f podman-compose.prod.yml up -d
          ${COMPOSE} -f podman-compose.prod.yml ps
          REMOTE
