services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DATABASE_URL: postgresql://maternalink:maternalink@postgres:5432/maternalink?schema=public
      RUN_SEED: "true"
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_BASE_URL: http://localhost:3000/api
    ports:
      - "3001:3001"
    depends_on:
      - api
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: maternalink
      POSTGRES_USER: maternalink
      POSTGRES_PASSWORD: maternalink
    ports:
      - "55432:5432"
    volumes:
      - maternalink-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U maternalink -d maternalink"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  maternalink-postgres-data:
