services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: deps
    environment:
      NODE_ENV: development
      PORT: 3001
      DB_HOST: postgres
      DB_PORT: 5432
      DATABASE_URL: postgresql://maternalink:maternalink@postgres:5432/maternalink?schema=public
      AI_SERVICE_BASE_URL: https://azrilfahmiardi-maternalink-ai.hf.space
      AI_MODE: remote
      AI_SERVICE_TIMEOUT_MS: 30000
      AI_LAYER2_TIMEOUT_MS: 600000
      KIA_OCR_SERVICE_URL: http://kia-ocr:8001
      KIA_OCR_TIMEOUT_MS: 60000
      SPEECH_STT_SERVICE_URL: http://speech-stt:8002
      SPEECH_STT_TIMEOUT_MS: 120000
      RUN_SEED: "true"
    ports:
      - "3001:3001"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/apps/api/node_modules
    working_dir: /app/apps/api
    command: sh ./docker-entrypoint.sh
    depends_on:
      postgres:
        condition: service_healthy
      kia-ocr:
        condition: service_started
      speech-stt:
        condition: service_started
    restart: unless-stopped

  kia-ocr:
    build:
      context: .
      dockerfile: services/kia-ocr/Dockerfile
    ports:
      - "8001:8001"
    restart: unless-stopped

  speech-stt:
    build:
      context: .
      dockerfile: services/speech-stt/Dockerfile
    environment:
      STT_MODEL_SIZE: small
      STT_DEVICE: cpu
      STT_COMPUTE_TYPE: int8
    ports:
      - "8002:8002"
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: deps
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_BASE_URL: http://localhost:3001/api
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/apps/web/node_modules
    working_dir: /app/apps/web
    command: pnpm run dev
    depends_on:
      - api
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: maternalink
      POSTGRES_USER: maternalink
      POSTGRES_PASSWORD: maternalink
    ports:
      - "55432:5432"
    volumes:
      - maternalink-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U maternalink -d maternalink"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  maternalink-postgres-data:
