services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-maternalink}
      POSTGRES_USER: ${POSTGRES_USER:-maternalink}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - maternalink-prod-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-maternalink} -d ${POSTGRES_DB:-maternalink}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  ai-service:
    image: ${AI_SERVICE_IMAGE:-ghcr.io/0xsyam/maternalink-ai-service:latest}
    restart: unless-stopped

  api:
    image: ${API_IMAGE:-ghcr.io/0xsyam/maternalink-api:latest}
    environment:
      NODE_ENV: production
      PORT: 3001
      DB_HOST: postgres
      DB_PORT: 5432
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      WEB_ORIGIN: ${WEB_ORIGIN:-https://hisyamardiansyah.me}
      AI_SERVICE_BASE_URL: http://ai-service:8000
      AI_MODE: ${AI_MODE:-fallback}
      AI_SERVICE_TIMEOUT_MS: ${AI_SERVICE_TIMEOUT_MS:-30000}
      RUN_SEED: ${RUN_SEED:-true}
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-true}
    ports:
      - "41874:3001"
    depends_on:
      postgres:
        condition: service_healthy
      ai-service:
        condition: service_started
    restart: unless-stopped

  web:
    image: ${WEB_IMAGE:-ghcr.io/0xsyam/maternalink-web:latest}
    environment:
      NODE_ENV: production
      PORT: 3000
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-https://hisyamardiansyah.me/maternalink/api}
      NEXT_PUBLIC_BASE_PATH: ${NEXT_PUBLIC_BASE_PATH:-/maternalink}
    ports:
      - "41873:3000"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  maternalink-prod-postgres-data:
